<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 220 1600 780" role="img" aria-labelledby="title desc">
  <title id="title">BoardBee high-level architecture diagram</title>
  <desc id="desc">A BoardBee server connected bidirectionally to laptop, tablet, and phone clients. Each client shows a simplified BoardBee UI.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1117"/>
      <stop offset="1" stop-color="#161a25"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7367ff"/>
      <stop offset="1" stop-color="#574fd6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2 2l8 4-8 4z" fill="#7c86a8"/>
    </marker>
    <style>
      .label { font: 800 18px Inter, Segoe UI, Arial, sans-serif; fill: #dbeafe; letter-spacing: 1.8px; text-transform: uppercase; }
      .small { font: 600 16px Inter, Segoe UI, Arial, sans-serif; fill: #8ca0c5; }
      .tiny { font: 600 12px Inter, Segoe UI, Arial, sans-serif; fill: #8ca0c5; }
      .device-title { font: 800 20px Inter, Segoe UI, Arial, sans-serif; fill: #f8fafc; }
      .device-copy { font: 600 12px Inter, Segoe UI, Arial, sans-serif; fill: #8ca0c5; }
      .server-title { font: 800 30px Inter, Segoe UI, Arial, sans-serif; fill: #f8fafc; }
      .server-copy { font: 600 17px Inter, Segoe UI, Arial, sans-serif; fill: #8ca0c5; }
      .stroke { stroke: #293044; stroke-width: 2; }
      .flow { fill: none; stroke: #7c86a8; stroke-width: 4; stroke-linecap: round; marker-start: url(#arrow); marker-end: url(#arrow); }
    </style>
  </defs>

  <g id="server" filter="url(#shadow)">
    <rect x="590" y="300" width="420" height="260" rx="34" fill="#1a1d27" class="stroke"/>
    <rect x="630" y="340" width="340" height="84" rx="20" fill="#11141d" stroke="#2a2d3a" stroke-width="2"/>
    <text x="800" y="375" text-anchor="middle" class="server-title">BoardBee Server</text>
    <g transform="translate(710 448)">
      <rect x="0" y="0" width="180" height="62" rx="16" fill="#0d1018" stroke="#2a2d3a" stroke-width="2"/>
      <circle cx="34" cy="31" r="10" fill="#22c55e"/>
      <rect x="62" y="18" width="88" height="8" rx="4" fill="#6c63ff"/>
      <rect x="62" y="36" width="64" height="8" rx="4" fill="#64748b"/>
    </g>
  </g>

  <path class="flow" d="M590 410C500 420 455 465 390 500"/>
  <path class="flow" d="M1010 410C1120 410 1210 440 1270 480"/>
  <path class="flow" d="M800 560C800 610 800 635 800 665"/>

  <g id="tablet" filter="url(#shadow)">
    <rect x="70" y="315" width="410" height="285" rx="36" fill="#0b0e15"/>
    <rect x="112" y="338" width="326" height="239" rx="22" fill="#1a1d27" stroke="#2a2d3a" stroke-width="2"/>
    <circle cx="92" cy="458" r="8" fill="#293044"/>
    <g transform="translate(135 356) scale(0.74)">
      <g transform="translate(118 0) scale(0.5)">
        <path d="M30 22C20 8 6 17 10 30c3 9 15 7 20-8Z" fill="#dbeafe"/>
        <path d="M34 22C44 8 58 17 54 30c-3 9-15 7-20-8Z" fill="#dbeafe"/>
        <ellipse cx="32" cy="36" rx="18" ry="23" fill="#f59e0b"/>
        <path d="M17 28c8 4 22 4 30 0M14 39c10 5 26 5 36 0M21 51c7 3 15 3 22 0" stroke="#0f1117" stroke-width="5" stroke-linecap="round"/>
        <rect x="37" y="35" width="22" height="25" rx="5" fill="#6c63ff" stroke="#0f1117" stroke-width="3"/>
      </g>
      <text x="170" y="42" text-anchor="middle" class="device-title">Board<tspan fill="#6c63ff">Bee</tspan></text>
      <text x="170" y="70" text-anchor="middle" class="device-copy">Share clipboard and files</text>
      <rect x="10" y="98" width="150" height="40" rx="10" fill="url(#accent)"/>
      <text x="85" y="124" text-anchor="middle" class="device-title" font-size="16">Send</text>
      <rect x="180" y="98" width="150" height="40" rx="10" fill="#171b26" stroke="#2a2d3a" stroke-width="2"/>
      <text x="255" y="124" text-anchor="middle" class="device-title" font-size="16">Receive</text>
      <rect x="10" y="162" width="320" height="50" rx="10" fill="#0d1018" stroke="#2a2d3a" stroke-width="2"/>
      <circle cx="32" cy="187" r="6" fill="#6c63ff"/>
      <text x="50" y="193" class="device-copy">Reading clipboard item...</text>
    </g>
  </g>

  <g id="phone" filter="url(#shadow)">
    <rect x="1248" y="245" width="224" height="438" rx="42" fill="#0b0e15"/>
    <rect x="1268" y="285" width="184" height="344" rx="28" fill="#1a1d27" stroke="#2a2d3a" stroke-width="2"/>
    <rect x="1318" y="263" width="84" height="10" rx="5" fill="#293044"/>
    <circle cx="1360" cy="655" r="8" fill="#293044"/>
    <g transform="translate(1288 306)">
      <g transform="translate(54 0) scale(0.4)">
        <path d="M30 22C20 8 6 17 10 30c3 9 15 7 20-8Z" fill="#dbeafe"/>
        <path d="M34 22C44 8 58 17 54 30c-3 9-15 7-20-8Z" fill="#dbeafe"/>
        <ellipse cx="32" cy="36" rx="18" ry="23" fill="#f59e0b"/>
        <path d="M17 28c8 4 22 4 30 0M14 39c10 5 26 5 36 0M21 51c7 3 15 3 22 0" stroke="#0f1117" stroke-width="5" stroke-linecap="round"/>
        <rect x="37" y="35" width="22" height="25" rx="5" fill="#6c63ff" stroke="#0f1117" stroke-width="3"/>
      </g>
      <text x="72" y="50" text-anchor="middle" class="device-title" font-size="17">Board<tspan fill="#6c63ff">Bee</tspan></text>
      <rect x="0" y="82" width="144" height="42" rx="10" fill="url(#accent)"/>
      <text x="72" y="109" text-anchor="middle" class="device-title" font-size="15">Send</text>
      <rect x="0" y="140" width="144" height="42" rx="10" fill="#171b26" stroke="#2a2d3a" stroke-width="2"/>
      <text x="72" y="167" text-anchor="middle" class="device-title" font-size="15">Receive</text>
      <rect x="0" y="204" width="144" height="60" rx="12" fill="#171b26" stroke="#2a2d3a" stroke-width="2" stroke-dasharray="5 5"/>
      <text x="72" y="239" text-anchor="middle" class="device-copy">Files</text>
      <rect x="0" y="286" width="144" height="44" rx="10" fill="#0d1018" stroke="#2a2d3a" stroke-width="2"/>
      <text x="14" y="313" class="device-copy">text/plain</text>
    </g>
  </g>

  <g id="laptop" filter="url(#shadow)">
    <rect x="520" y="665" width="560" height="280" rx="26" fill="#0b0e15"/>
    <rect x="548" y="693" width="504" height="220" rx="16" fill="#1a1d27" stroke="#2a2d3a" stroke-width="2"/>
    <path d="M474 948h652l-62 42H536z" fill="#151924" stroke="#2a2d3a" stroke-width="2"/>
    <rect x="710" y="958" width="180" height="12" rx="6" fill="#293044"/>
    <g transform="translate(574 714)">
      <g transform="translate(178 4) scale(0.55)">
        <path d="M30 22C20 8 6 17 10 30c3 9 15 7 20-8Z" fill="#dbeafe"/>
        <path d="M34 22C44 8 58 17 54 30c-3 9-15 7-20-8Z" fill="#dbeafe"/>
        <ellipse cx="32" cy="36" rx="18" ry="23" fill="#f59e0b"/>
        <path d="M17 28c8 4 22 4 30 0M14 39c10 5 26 5 36 0M21 51c7 3 15 3 22 0" stroke="#0f1117" stroke-width="5" stroke-linecap="round"/>
        <rect x="37" y="35" width="22" height="25" rx="5" fill="#6c63ff" stroke="#0f1117" stroke-width="3"/>
      </g>
      <text x="240" y="50" text-anchor="middle" class="device-title">Board<tspan fill="#6c63ff">Bee</tspan></text>
      <text x="240" y="80" text-anchor="middle" class="device-copy">Share your clipboard and files across any machine</text>
      <rect x="24" y="108" width="210" height="44" rx="10" fill="url(#accent)"/>
      <text x="129" y="136" text-anchor="middle" class="device-title" font-size="17">Send</text>
      <rect x="254" y="108" width="210" height="44" rx="10" fill="#171b26" stroke="#2a2d3a" stroke-width="2"/>
      <text x="359" y="136" text-anchor="middle" class="device-title" font-size="17">Receive</text>
      <rect x="24" y="176" width="440" height="44" rx="10" fill="#0d1018" stroke="#2a2d3a" stroke-width="2"/>
      <circle cx="48" cy="198" r="6" fill="#22c55e"/>
      <text x="66" y="204" class="device-copy">Sent 1 clipboard item to server.</text>
    </g>
  </g>

</svg>
